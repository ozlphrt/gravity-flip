<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0d14" />
    <meta name="description" content="Gravity Flip Cube — a 3D sliding block puzzle. Rotate the glass cube, shift gravity, and guide colored cubes to their matching sockets." />
    <title>Gravity Flip Cube</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" href="./favicon.png" type="image/png" />
    <link rel="manifest" href="./manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Gravity Flip" />
    <link rel="apple-touch-icon" href="./favicon.png" />
    <script>
      // Clear out any old PWA Service Workers that are trying to load non-existent cached assets
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let registration of registrations) {
            registration.unregister();
          }
        });
      }
      if ('caches' in window) {
        caches.keys().then(function(keys) {
          keys.forEach(function(key) {
            caches.delete(key);
          });
        });
      }
    </script>
    <style>
      /* Critical styles to prevent Flash of Unstyled Content (FOUC) on cold start */
      html, body {
        background-color: #0a0d14 !important;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      .loading-screen {
        position: fixed;
        inset: 0;
        z-index: 1000;
        background-color: #0a0d14;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 1;
        transition: opacity 0.2s ease;
      }
      .loading-logo {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .loading-title {
        font-size: 20px;
        font-weight: 800;
        letter-spacing: 0.2em;
        color: #00e5ff;
        text-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
        text-transform: uppercase;
      }
      .loading-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(0, 229, 255, 0.1);
        border-top-color: #00e5ff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <script type="module" crossorigin src="/gravity-flip/assets/index-D7e2Itle.js"></script>
    <link rel="stylesheet" crossorigin href="/gravity-flip/assets/index-Cv27N1_J.css">
  </head>
  <body>
    <!-- Loading screen -->
    <div id="loading" class="loading-screen">
      <div class="loading-logo">
        <span class="loading-title">GRAVITY FLIP CUBE</span>
        <div class="loading-spinner"></div>
      </div>
    </div>

    <!-- Main layout -->
    <div id="app">

      <!-- Stylish Top-Left Level & Color Info -->
      <div class="level-hud-container">
        <div id="level-number" class="level-number-display">01</div>
        <div class="level-label-display">LEVEL</div>
        <div id="level-colors" class="level-colors-display"></div>
      </div>

      <!-- ── 3D Game canvas ─────────────────────────────── -->
      <main class="game-area">
        <canvas id="game-canvas"></canvas>





        <!-- Mute button -->
        <button id="btn-mute" class="mute-btn" aria-label="Toggle sound">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path class="wave" d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            <line class="mute-line" x1="22" y1="9" x2="16" y2="15"></line>
            <line class="mute-line" x1="16" y1="9" x2="22" y2="15"></line>
          </svg>
        </button>
      </main>



      <!-- Version Info Trigger -->
      <button id="btn-info" class="info-btn" aria-label="Show version information">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="16" x2="12" y2="12"></line>
          <line x1="12" y1="8" x2="12.01" y2="8"></line>
        </svg>
      </button>
    </div>

    <!-- ── Version Info Modal ────────────────────────────── -->
    <div id="modal-info" class="modal-overlay hidden">
      <div class="modal-box info-modal-box">
        <h3 class="info-title">SYSTEM DIAGNOSTICS</h3>
        <div class="info-details">
          <div class="info-row">
            <span class="info-label">VERSION</span>
            <span class="info-value">1.4.0</span>
          </div>
          <div class="info-row">
            <span class="info-label">COMMIT HASH</span>
            <span id="info-commit" class="info-value">07669c6</span>
          </div>
          <div class="info-row">
            <span class="info-label">BUILD NUMBER</span>
            <span id="info-build" class="info-value">45</span>
          </div>
          <div class="info-row">
            <span class="info-label">PWA STATUS</span>
            <span id="info-pwa" class="info-value">Web Browser</span>
          </div>
        </div>
        <button id="btn-info-close" class="btn-secondary info-close-btn">Close</button>
      </div>
    </div>

    <!-- ── Level Complete Modal ───────────────────────────── -->
    <div id="modal-complete" class="modal-overlay hidden">
      <div class="modal-box">
        <div id="modal-stars" class="modal-stars">★★★</div>
        <h2 class="modal-title">SUCCESS</h2>
        <div class="modal-subtitle">Level 1 Cleared</div>
      </div>
    </div>

    <!-- ── Update Validation Modal ───────────────────────── -->
    <div id="modal-update" class="modal-overlay hidden">
      <div class="modal-box">
        <div class="modal-stars" style="color: var(--cyan); text-shadow: 0 0 20px rgba(0, 229, 255, 0.4);">⚡</div>
        <h2 class="modal-title">UPDATE AVAILABLE</h2>
        <p style="margin-bottom: 24px; color: var(--text-dim); font-size: 13px; text-align: center;">
          A new version of Gravity Flip is available. Update now to get the latest levels and improvements!
        </p>
        <div class="modal-actions">
          <button id="btn-update-now" class="btn-primary">Update Now</button>
          <button id="btn-update-later" class="btn-secondary">Later</button>
        </div>
      </div>
    </div>

  </body>
</html>
