<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0d14" />
    <meta name="description" content="Gravity Flip Cube — a 3D sliding block puzzle. Rotate the glass cube, shift gravity, and guide colored cubes to their matching sockets." />
    <title>Gravity Flip Cube</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" href="./favicon.png" type="image/png" />
    <link rel="manifest" href="./manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Gravity Flip" />
    <link rel="apple-touch-icon" href="./favicon.png" />
    <script>
      // Clear out any old PWA Service Workers that are trying to load non-existent cached assets
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let registration of registrations) {
            registration.unregister();
          }
        });
      }
      if ('caches' in window) {
        caches.keys().then(function(keys) {
          keys.forEach(function(key) {
            caches.delete(key);
          });
        });
      }
    </script>
    <style>
      /* Critical styles to prevent Flash of Unstyled Content (FOUC) on cold start */
      html, body {
        background-color: #0a0d14 !important;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      .loading-screen {
        position: fixed;
        inset: 0;
        z-index: 1000;
        background-color: #0a0d14;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 1;
        transition: opacity 0.2s ease;
      }
      .loading-logo {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .loading-title {
        font-size: 20px;
        font-weight: 800;
        letter-spacing: 0.2em;
        color: #00e5ff;
        text-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
        text-transform: uppercase;
      }
      .loading-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(0, 229, 255, 0.1);
        border-top-color: #00e5ff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <script type="module" crossorigin src="/gravity-flip/assets/index-CQe3veJE.js"></script>
    <link rel="stylesheet" crossorigin href="/gravity-flip/assets/index-D-Wqmfi-.css">
  </head>
  <body>
    <!-- Loading screen -->
    <div id="loading" class="loading-screen">
      <div class="loading-logo">
        <span class="loading-title">GRAVITY FLIP CUBE</span>
        <div class="loading-spinner"></div>
      </div>
    </div>

    <!-- Main layout -->
    <div id="app">

      <!-- Floating Level Indicator -->
      <div id="level-title" class="level-indicator">Level 1</div>

      <!-- ── 3D Game canvas ─────────────────────────────── -->
      <main class="game-area">
        <canvas id="game-canvas"></canvas>





        <!-- Mute button -->
        <button id="btn-mute" class="mute-btn" aria-label="Toggle sound">🔊</button>
      </main>



      <!-- Version Badge -->
      <div id="app-version" class="version-badge">Commit d56e79e</div>
    </div>

    <!-- ── Level Complete Modal ───────────────────────────── -->
    <div id="modal-complete" class="modal-overlay hidden">
      <div class="modal-box">
        <div id="modal-stars" class="modal-stars">★★★</div>
        <h2 class="modal-title">SUCCESS</h2>
        <div class="modal-subtitle">Level 1 Cleared</div>
      </div>
    </div>

    <!-- ── Update Validation Modal ───────────────────────── -->
    <div id="modal-update" class="modal-overlay hidden">
      <div class="modal-box">
        <div class="modal-stars" style="color: var(--cyan); text-shadow: 0 0 20px rgba(0, 229, 255, 0.4);">⚡</div>
        <h2 class="modal-title">UPDATE AVAILABLE</h2>
        <p style="margin-bottom: 24px; color: var(--text-dim); font-size: 13px; text-align: center;">
          A new version of Gravity Flip is available. Update now to get the latest levels and improvements!
        </p>
        <div class="modal-actions">
          <button id="btn-update-now" class="btn-primary">Update Now</button>
          <button id="btn-update-later" class="btn-secondary">Later</button>
        </div>
      </div>
    </div>

  </body>
</html>
